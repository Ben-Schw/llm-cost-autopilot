services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "autopilot.api:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "src"]

  worker:
    build: .
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "scripts.worker"]
    depends_on:
      - api