<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Cost Autopilot</title>
<style>
  :root {
    --ink: #0d1b2a;
    --panel: #14283d;
    --panel-2: #1b3550;
    --line: #2a4a6b;
    --haze: #5b7da0;
    --paper: #f4f6f8;
    --signal: #46d39a;     /* savings / go */
    --signal-dim: #2a8c66;
    --warn: #e8a13c;       /* escalation */
    --low: #46d39a;
    --medium: #4aa3e8;
    --high: #e8734a;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 70% -10%, #1c3a57 0%, transparent 60%),
      var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }

  header { display: flex; align-items: baseline; justify-content: space-between;
           border-bottom: 1px solid var(--line); padding-bottom: 18px; margin-bottom: 30px;
           flex-wrap: wrap; gap: 10px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .brand .tag { font-family: var(--mono); font-size: 11px; color: var(--haze);
                text-transform: uppercase; letter-spacing: 0.12em; }
  .status { font-family: var(--mono); font-size: 12px; color: var(--haze); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--signal);
         box-shadow: 0 0 8px var(--signal); }
  .dot.off { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--line);
           border-radius: 12px; padding: 22px; }
  .panel h2 { font-size: 12px; font-weight: 600; text-transform: uppercase;
              letter-spacing: 0.1em; color: var(--haze); margin: 0 0 16px; }

  /* playground */
  label { display: block; font-size: 12px; color: var(--haze); margin: 0 0 6px;
          font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
  textarea, select, input[type="number"] {
    width: 100%; background: var(--ink); color: var(--paper);
    border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px;
    font-family: var(--sans); font-size: 14px; resize: vertical;
  }
  textarea { min-height: 88px; }
  textarea:focus, select:focus, input[type="number"]:focus { outline: none; border-color: var(--haze); }
  .row { display: flex; gap: 12px; margin-top: 14px; }
  .row > div { flex: 1; }
  button {
    margin-top: 16px; width: 100%; background: var(--signal); color: #06281c;
    border: none; border-radius: 8px; padding: 12px; font-weight: 600;
    font-size: 14px; cursor: pointer; font-family: var(--sans);
  }
  button:hover { background: #58e0a8; }
  button:disabled { background: var(--signal-dim); cursor: wait; opacity: 0.7; }

  .result { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 16px;
            display: none; }
  .result.show { display: block; }
  .answer { background: var(--ink); border: 1px solid var(--line); border-radius: 8px;
            padding: 13px; font-size: 14px; margin-bottom: 14px; white-space: pre-wrap;
            word-break: break-word; max-height: 320px; overflow-y: auto; }
  .meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .chip { background: var(--ink); border: 1px solid var(--line); border-radius: 8px;
          padding: 9px 11px; }
  .chip .k { font-family: var(--mono); font-size: 10px; color: var(--haze);
             text-transform: uppercase; letter-spacing: 0.08em; }
  .chip .v { font-size: 14px; font-weight: 600; margin-top: 3px; }
  .tier-low { color: var(--low); }
  .tier-medium { color: var(--medium); }
  .tier-high { color: var(--high); }
  .err { color: var(--warn); font-size: 13px; font-family: var(--mono); }

  /* dashboard */
  .hero-num { font-size: 52px; font-weight: 700; letter-spacing: -0.02em;
              color: var(--signal); line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-sub { font-size: 13px; color: var(--haze); margin-top: 6px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px;
              padding: 9px 0; border-bottom: 1px solid var(--line); }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .lbl { color: var(--haze); }
  .stat-row .val { font-family: var(--mono); font-weight: 600; font-variant-numeric: tabular-nums; }

  .dist { margin-top: 8px; }
  .bar-row { margin: 11px 0; }
  .bar-head { display: flex; justify-content: space-between; font-size: 12px;
              margin-bottom: 5px; }
  .bar-head .name { font-family: var(--mono); }
  .bar-track { height: 8px; background: var(--ink); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

  .refresh { font-family: var(--mono); font-size: 11px; color: var(--haze);
             background: none; border: 1px solid var(--line); width: auto;
             margin: 0; padding: 5px 10px; display: inline-block; }
  .refresh:hover { background: var(--panel); }
  .dash-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .dash-head h2 { margin: 0; }
  .empty { color: var(--haze); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>Cost Autopilot</h1>
      <span class="tag">routing control</span>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="status-text">checking…</span></div>
  </header>

  <div class="grid">
    <!-- Playground -->
    <section class="panel">
      <h2>Send a request</h2>
      <label for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="What is the capital of Austria? One word.">What is the capital of Austria? One word.</textarea>
      <div class="row">
        <div>
          <label for="task">Task type</label>
          <select id="task">
            <option value="default">default</option>
            <option value="classification">classification</option>
            <option value="extraction">extraction</option>
            <option value="summarization">summarization</option>
          </select>
        </div>
        <div>
          <label for="low">Low-tier model</label>
          <select id="low">
            <option value="">auto (config default)</option>
            <option value="haiku">haiku</option>
            <option value="ollama">ollama (llama)</option>
          </select>
        </div>
        <div>
          <label for="maxtok">Max tokens</label>
          <input id="maxtok" type="number" min="1" max="4096" value="1024">
        </div>
      </div>
      <button id="send">Route &amp; respond</button>

      <div class="result" id="result">
        <div class="answer" id="answer"></div>
        <div class="meta" id="meta"></div>
      </div>
    </section>

    <!-- Dashboard -->
    <section class="panel">
      <div class="dash-head">
        <h2>Savings dashboard</h2>
        <button class="refresh" id="refresh">refresh</button>
      </div>
      <div id="dash">
        <div class="hero-num" id="reduction">—</div>
        <div class="hero-sub">cost reduction vs. sending everything to the top model</div>

        <div style="margin-top:22px">
          <div class="stat-row"><span class="lbl">Requests handled</span><span class="val" id="total">—</span></div>
          <div class="stat-row"><span class="lbl">Actual spend</span><span class="val" id="actual">—</span></div>
          <div class="stat-row"><span class="lbl">Baseline (all-top)</span><span class="val" id="baseline">—</span></div>
          <div class="stat-row"><span class="lbl">Escalation rate</span><span class="val" id="esc">—</span></div>
        </div>

        <div class="dist" id="dist"></div>
      </div>
    </section>
  </div>
</div>

<script>
const TIER_COLOR = { "claude-haiku-4.5": "var(--low)", "llama3.1-8b": "var(--low)",
                     "claude-sonnet-4.6": "var(--medium)", "claude-opus-4.8": "var(--high)" };

async function ping() {
  const dot = document.getElementById("dot");
  const txt = document.getElementById("status-text");
  try {
    const r = await fetch("/v1/models");
    if (r.ok) { dot.classList.remove("off"); txt.textContent = "online"; }
    else throw new Error();
  } catch { dot.classList.add("off"); txt.textContent = "offline"; }
}

function tierClass(t) { return "tier-" + t; }

async function send() {
  const btn = document.getElementById("send");
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return;
  const body = { prompt, task_type: document.getElementById("task").value };
  const low = document.getElementById("low").value;
  if (low) body.low_provider = low;
  const maxtok = parseInt(document.getElementById("maxtok").value, 10);
  if (maxtok > 0) body.max_tokens = maxtok;

  btn.disabled = true; btn.textContent = "routing…";
  const result = document.getElementById("result");
  const answer = document.getElementById("answer");
  const meta = document.getElementById("meta");
  try {
    const r = await fetch("/v1/completions", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    result.classList.add("show");
    if (!r.ok) {
      answer.innerHTML = '<span class="err">' + (data.detail ? JSON.stringify(data.detail) : "Request failed") + '</span>';
      meta.innerHTML = "";
    } else {
      answer.textContent = data.output;
      const m = data.routing;
      meta.innerHTML = `
        <div class="chip"><div class="k">tier</div><div class="v ${tierClass(m.tier)}">${m.tier}</div></div>
        <div class="chip"><div class="k">model</div><div class="v">${m.chosen_model}</div></div>
        <div class="chip"><div class="k">cost</div><div class="v">$${m.cost_usd.toFixed(6)}</div></div>
        <div class="chip"><div class="k">confidence</div><div class="v">${(m.confidence*100).toFixed(0)}%</div></div>
        <div class="chip"><div class="k">will verify</div><div class="v">${m.will_verify ? "yes" : "no"}</div></div>
        <div class="chip"><div class="k">reason</div><div class="v" style="font-size:12px">${m.verify_reason}</div></div>`;
    }
  } catch (e) {
    result.classList.add("show");
    answer.innerHTML = '<span class="err">Could not reach the service.</span>';
    meta.innerHTML = "";
  } finally {
    btn.disabled = false; btn.textContent = "Route & respond";
    setTimeout(loadStats, 800);
  }
}

async function loadStats() {
  try {
    const r = await fetch("/v1/stats");
    const s = await r.json();
    if (!s.total_requests) {
      document.getElementById("reduction").textContent = "—";
      document.getElementById("dist").innerHTML = '<p class="empty">No requests logged yet. Send one to populate the dashboard.</p>';
      ["total","actual","baseline","esc"].forEach(id => document.getElementById(id).textContent = "—");
      return;
    }
    document.getElementById("reduction").textContent = s.cost_reduction_pct.toFixed(1) + "%";
    document.getElementById("total").textContent = s.total_requests;
    document.getElementById("actual").textContent = "$" + s.actual_cost_usd.toFixed(4);
    document.getElementById("baseline").textContent = "$" + s.baseline_cost_usd.toFixed(4);
    document.getElementById("esc").textContent = (s.escalation_rate*100).toFixed(1) + "%";

    const dist = s.routing_distribution || {};
    const entries = Object.entries(dist).sort((a,b) => b[1]-a[1]);
    document.getElementById("dist").innerHTML = "<h2 style='margin-top:24px'>Routing distribution</h2>" +
      entries.map(([model, share]) => `
        <div class="bar-row">
          <div class="bar-head"><span class="name">${model}</span><span>${(share*100).toFixed(0)}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(share*100).toFixed(0)}%;background:${TIER_COLOR[model]||'var(--haze)'}"></div></div>
        </div>`).join("");
  } catch (e) { /* leave as-is */ }
}

document.getElementById("send").addEventListener("click", send);
document.getElementById("refresh").addEventListener("click", loadStats);
ping(); loadStats();
setInterval(ping, 15000);
setInterval(loadStats, 5000);
</script>
</body>
</html>
